name: Claude Window Keeper

on:
  schedule:
    - cron: '*/5 * * * *'   # GitHub's minimum granularity. Best-effort timing, not exact-to-minute.
  workflow_dispatch: {}      # lets you manually trigger a test run from the Actions tab

permissions:
  contents: write   # needed so the job can commit the updated state.json

concurrency:
  group: claude-window-keeper
  cancel-in-progress: false  # never let overlapping runs stomp on each other

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      due: ${{ steps.check.outputs.due }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: check
        run: python3 scripts/check_due.py

  fire:
    needs: check
    if: github.event_name == 'workflow_dispatch' || needs.check.outputs.due == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Send trivial message and advance schedule
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 scripts/fire_and_advance.py
      - name: Commit updated state
        run: |
          git config user.name "claude-window-keeper"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "Advance next trigger time" || echo "nothing to commit"
          git push
